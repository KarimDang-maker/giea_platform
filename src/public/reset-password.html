<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #5568d3;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      text-align: center;
      display: none;
    }
    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .token-info {
      background-color: #e7f3ff;
      border: 1px solid #b3d9ff;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #004085;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reset Your Password</h1>
    
    <div class="token-info" id="tokenInfo" style="display: none;">
      Token captured: <strong id="tokenValue"></strong>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input 
          type="password" 
          id="newPassword" 
          name="newPassword" 
          placeholder="Enter your new password"
          required
          minlength="8"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          placeholder="Confirm your new password"
          required
          minlength="8"
        />
      </div>

      <button type="submit" id="submitBtn">Reset Password</button>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Resetting your password...</p>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('message').textContent = 'Error: No reset token found. Please use the link from your email.';
      document.getElementById('message').classList.add('error');
      document.getElementById('submitBtn').disabled = true;
    } else {
      // Show token info
      document.getElementById('tokenInfo').style.display = 'block';
      document.getElementById('tokenValue').textContent = token.substring(0, 20) + '...';
    }

    // Handle form submission
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate passwords match
      if (newPassword !== confirmPassword) {
        document.getElementById('message').textContent = 'Passwords do not match!';
        document.getElementById('message').classList.remove('success');
        document.getElementById('message').classList.add('error');
        document.getElementById('message').style.display = 'block';
        return;
      }

      // Show loading
      document.getElementById('loading').style.display = 'block';
      document.getElementById('message').style.display = 'none';
      document.getElementById('submitBtn').disabled = true;

      try {
        // Send reset password request
        const response = await fetch('http://localhost:5000/api/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            // Method 1: Send token in Authorization header
            'Authorization': `Bearer ${token}`
            // Alternative: Send token in body by uncommenting below
            // Remove Authorization header if using this approach
          },
          body: JSON.stringify({
            // Method 2: Send token in body (uncomment to use)
            // token: token,
            newPassword: newPassword,
            confirmPassword: confirmPassword
          }),
          credentials: 'include'
        });

        const data = await response.json();

        document.getElementById('loading').style.display = 'none';

        if (response.ok) {
          // Success
          document.getElementById('message').textContent = '✅ ' + data.message;
          document.getElementById('message').classList.remove('error');
          document.getElementById('message').classList.add('success');
          document.getElementById('message').style.display = 'block';
          
          // Disable form
          document.getElementById('resetForm').style.display = 'none';
          
          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = 'http://localhost:3000/login';
          }, 3000);
        } else {
          // Error
          document.getElementById('message').textContent = '❌ Error: ' + (data.message || 'Failed to reset password');
          document.getElementById('message').classList.remove('success');
          document.getElementById('message').classList.add('error');
          document.getElementById('message').style.display = 'block';
          document.getElementById('submitBtn').disabled = false;
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('message').textContent = '❌ Error: ' + error.message;
        document.getElementById('message').classList.remove('success');
        document.getElementById('message').classList.add('error');
        document.getElementById('message').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
